<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat Room</title>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-1: #eef2ff;
      --bg-2: #f8fafc;
      --bg-3: #e0f2fe;

      --glass: rgba(255, 255, 255, 0.55);
      --glass-strong: rgba(255, 255, 255, 0.72);
      --border: rgba(255, 255, 255, 0.45);

      --text-main: #0f172a;
      --text-secondary: #475569;
      --text-light: #64748b;

      --primary: #4f46e5;
      --primary-hover: #4338ca;

      --success: #10b981;
      --danger: #dc2626;
      --danger-soft: rgba(220, 38, 38, 0.08);

      --chat-me: linear-gradient(135deg, #60a5fa, #6366f1);
      --chat-other: rgba(255, 255, 255, 0.72);

      --shadow-lg: 0 24px 80px rgba(15, 23, 42, 0.18);
      --shadow-md: 0 12px 32px rgba(15, 23, 42, 0.10);
      --shadow-sm: 0 4px 16px rgba(15, 23, 42, 0.08);

      --radius-xl: 28px;
      --radius-lg: 20px;
      --radius-md: 14px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text-main);
      background:
        radial-gradient(circle at top left, rgba(99, 102, 241, 0.16), transparent 35%),
        radial-gradient(circle at bottom right, rgba(59, 130, 246, 0.14), transparent 35%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2), var(--bg-3));
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(rgba(99, 102, 241, 0.08) 1px, transparent 1px),
        linear-gradient(rgba(99, 102, 241, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99, 102, 241, 0.03) 1px, transparent 1px);
      background-size: 22px 22px, 120px 120px, 120px 120px;
      pointer-events: none;
      opacity: 0.55;
    }

    .app {
      width: 1180px;
      max-width: calc(100vw - 48px);
      height: 760px;
      max-height: calc(100vh - 48px);
      display: flex;
      border-radius: var(--radius-xl);
      overflow: hidden;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
      z-index: 1;
    }

    .sidebar {
      width: 310px;
      padding: 28px 24px;
      background:
        linear-gradient(180deg, rgba(15, 23, 42, 0.88), rgba(30, 41, 59, 0.82)),
        rgba(255, 255, 255, 0.06);
      color: white;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-right: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #60a5fa, #6366f1);
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.35);
      font-size: 24px;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-text p {
      margin: 4px 0 0;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.72);
    }

    .sidebar-card {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 18px 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    .sidebar-card h3 {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .sidebar-card p {
      margin: 0;
      font-size: 13px;
      line-height: 1.7;
      color: rgba(255, 255, 255, 0.8);
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      font-size: 14px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.95);
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #94a3b8;
      box-shadow: 0 0 0 4px rgba(148, 163, 184, 0.18);
      flex-shrink: 0;
    }

    .status-dot.warning {
      background: #f59e0b;
      box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.18);
    }

    .status-dot.online {
      background: #22c55e;
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.18);
    }

    .quick-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 2px;
    }

    .quick-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.06);
      font-size: 13px;
      color: rgba(255, 255, 255, 0.84);
    }

    .quick-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.1);
      font-size: 16px;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: rgba(255, 255, 255, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .auth-panel {
      margin: auto;
      width: min(540px, calc(100% - 40px));
      padding: 30px 28px;
      border-radius: 24px;
      background: var(--glass-strong);
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .auth-panel h2 {
      margin: 0 0 10px;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text-main);
    }

    .auth-desc {
      margin: 0 0 20px;
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.7;
    }

    .form-row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .form-row input {
      flex: 1 1 180px;
    }

    input {
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 16px;
      padding: 13px 15px;
      outline: none;
      font-size: 14px;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.82);
      transition: all 0.2s ease;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:focus {
      border-color: rgba(99, 102, 241, 0.45);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
      background: rgba(255, 255, 255, 0.96);
    }

    button {
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      background: linear-gradient(135deg, var(--primary), #6366f1);
      color: white;
      box-shadow: 0 10px 24px rgba(99, 102, 241, 0.22);
    }

    button:hover {
      transform: translateY(-1px);
      background: linear-gradient(135deg, var(--primary-hover), #4f46e5);
    }

    button.secondary {
      background: rgba(15, 23, 42, 0.08);
      color: var(--text-main);
      box-shadow: none;
      border: 1px solid rgba(148, 163, 184, 0.24);
    }

    button.secondary:hover {
      background: rgba(15, 23, 42, 0.12);
    }

    button.danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid rgba(220, 38, 38, 0.28);
      box-shadow: none;
    }

    button.danger:hover {
      background: var(--danger-soft);
      transform: translateY(-1px);
    }

    .tip {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-light);
    }

    .error {
      color: #dc2626;
    }

    .success {
      color: #16a34a;
    }

    .chat-panel {
      display: none;
      flex: 1;
      flex-direction: column;
      min-height: 0;
      overflow: hidden;
    }

    .chat-header {
      padding: 18px 24px;
      background: rgba(255, 255, 255, 0.48);
      border-bottom: 1px solid rgba(148, 163, 184, 0.16);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .chat-user {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #60a5fa, #6366f1);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.22);
      flex-shrink: 0;
    }

    .chat-user-meta {
      min-width: 0;
    }

    .chat-user-meta .name {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-main);
    }

    .chat-user-meta .sub {
      margin-top: 3px;
      font-size: 12px;
      color: var(--text-light);
    }

    .room-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .room-bar .room-label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .room-bar input {
      width: 130px;
      padding: 11px 14px;
      border-radius: 14px;
    }

    .messages {
      flex: 1;
      min-height: 0;
      padding: 26px 24px;
      overflow-y: auto;
      background:
        linear-gradient(rgba(255,255,255,0.24), rgba(255,255,255,0.24)),
        radial-gradient(circle at top left, rgba(96, 165, 250, 0.10), transparent 26%),
        radial-gradient(circle at bottom right, rgba(99, 102, 241, 0.10), transparent 26%);
      position: relative;
    }

    .messages::-webkit-scrollbar {
      width: 8px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.35);
      border-radius: 999px;
    }

    .message {
      position: relative;
      max-width: 72%;
      margin-bottom: 16px;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      box-shadow: var(--shadow-sm);
    }

    .message.me {
      margin-left: auto;
      background: var(--chat-me);
      color: white;
      border-bottom-right-radius: 8px;
    }

    .message.me::after {
      content: "";
      position: absolute;
      right: -6px;
      bottom: 6px;
      width: 14px;
      height: 14px;
      background: #6366f1;
      border-bottom-left-radius: 12px;
      transform: rotate(28deg);
      z-index: -1;
    }

    .message.other {
      margin-right: auto;
      background: var(--chat-other);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-bottom-left-radius: 8px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .message.other::after {
      content: "";
      position: absolute;
      left: -6px;
      bottom: 6px;
      width: 14px;
      height: 14px;
      background: rgba(255, 255, 255, 0.84);
      border-bottom-right-radius: 12px;
      transform: rotate(-28deg);
      z-index: -1;
    }

    .message.system {
      max-width: 80%;
      margin: 14px auto;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.56);
      color: var(--text-light);
      text-align: center;
      font-size: 12px;
      box-shadow: none;
      border: 1px solid rgba(148, 163, 184, 0.16);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .sender {
      font-weight: 700;
      margin-bottom: 4px;
      font-size: 13px;
      color: #334155;
    }

    .message.me .sender {
      color: rgba(255, 255, 255, 0.92);
    }

    .time {
      margin-top: 6px;
      font-size: 11px;
      opacity: 0.78;
    }

    .input-area {
      padding: 16px 18px 18px;
      background: rgba(255, 255, 255, 0.45);
      border-top: 1px solid rgba(148, 163, 184, 0.16);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .tool-btn {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      background: rgba(255, 255, 255, 0.78);
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: none;
      flex-shrink: 0;
    }

    .tool-btn:hover {
      background: rgba(255, 255, 255, 0.96);
      transform: translateY(-1px);
      color: var(--primary);
    }

    .composer {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px 8px 14px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(148, 163, 184, 0.22);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
      min-width: 0;
    }

    .composer input {
      border: none;
      background: transparent;
      box-shadow: none;
      padding: 8px 2px;
      flex: 1;
      min-width: 0;
    }

    .composer input:focus {
      box-shadow: none;
    }

    .send-btn {
      padding: 12px 18px;
      min-width: 84px;
    }

    @media (max-width: 980px) {
      .app {
        width: calc(100vw - 24px);
        height: calc(100vh - 24px);
      }

      .sidebar {
        display: none;
      }

      .auth-panel {
        width: min(560px, calc(100% - 24px));
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">💬</div>
        <div class="brand-text">
          <h1>Chat Room</h1>
        </div>
      </div>

      <div class="sidebar-card">
        <h3>项目简介</h3>
        <p>
          一个基于 FastAPI、WebSocket 和 SQLite 的简易实时聊天室。
          当前版本支持注册、登录、房间聊天、消息持久化、历史记录查询与清除。
        </p>
      </div>

      <div class="sidebar-card">
        <h3>连接状态</h3>
        <div class="status-row">
          <span>后端地址</span>
          <span class="status-badge">127.0.0.1:8000</span>
        </div>

        <div class="status-row">
          <span>登录状态</span>
          <span class="status-badge">
            <span class="status-dot" id="statusDot"></span>
            <span id="loginStatus">未登录</span>
          </span>
        </div>

        <div class="status-row">
          <span>房间状态</span>
          <span class="status-badge" id="roomStatus">未进入房间</span>
        </div>
      </div>
    </aside>

    <main class="main">
      <div class="auth-panel" id="authPanel">
        <h2>欢迎来到聊天室</h2>
        <p class="auth-desc">
          请输入用户名和密码。你可以先注册，再登录进入聊天室。
          登录成功后，可进入任意房间并查看历史聊天记录。
        </p>

        <div class="form-row">
          <input id="username" placeholder="用户名，例如 alice">
          <input id="password" type="password" placeholder="密码，例如 123456">
        </div>

        <div class="form-row">
          <button onclick="register()">注册</button>
          <button class="secondary" onclick="login()">登录</button>
        </div>

        <div class="tip" id="authTip">
          请先注册或登录，登录成功后进入聊天室。
        </div>
      </div>

      <div class="chat-panel" id="chatPanel">
        <div class="chat-header">
          <div class="chat-user">
            <div class="avatar" id="avatarText">U</div>
            <div class="chat-user-meta">
              <div class="name" id="currentUser">-</div>
              <div class="sub">在线聊天 · 历史消息支持</div>
            </div>
          </div>

          <div class="room-bar">
            <span class="room-label">房间</span>
            <input id="room" value="room1">
            <button onclick="connect()">进入房间</button>
            <button class="danger" onclick="clearHistory()">清除历史</button>
            <button class="secondary" onclick="logout()">退出登录</button>
          </div>
        </div>

        <div class="messages" id="messages"></div>

        <div class="input-area">
          <button class="tool-btn" type="button" title="表情（预留）">😊</button>

          <div class="composer">
            <input id="content" placeholder="输入消息，按 Enter 发送">
            <button class="tool-btn" type="button" title="文件上传（预留）">📎</button>
          </div>

          <button class="send-btn" onclick="sendMessage()">发送</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API_BASE = "http://127.0.0.1:8000";
    const WS_BASE = "ws://127.0.0.1:8000";

    // 全局变量
    let ws = null;
    let currentUser = "";        // 记录当前用户
    let currentRoom = "";        // 记录当前房间
    let ignoreNextClose = false; // 切换房间 / 退出登录时避免显示多余的“连接已断开”

    // 显示注册 / 登录提示信息
    function setTip(text, type = "") {
      const tip = document.getElementById("authTip");
      tip.innerText = text;
      tip.className = "tip " + type;
    }

    // 更新左侧在线状态
    function setOnlineStatus(text, state = "") {
      const statusDot = document.getElementById("statusDot");
      const loginStatus = document.getElementById("loginStatus");

      loginStatus.innerText = text;
      statusDot.className = "status-dot";

      if (state) {
        statusDot.classList.add(state);
      }
    }

    // 更新当前房间状态
    function setRoomStatus(text) {
      document.getElementById("roomStatus").innerText = text;
    }

    // 登录成功后切换到聊天界面
    function showChat(username) {
      currentUser = username;

      document.getElementById("currentUser").innerText = username;
      document.getElementById("avatarText").innerText = username.charAt(0).toUpperCase();

      setOnlineStatus("已登录：" + username, "warning");
      setRoomStatus("未进入房间");

      document.getElementById("authPanel").style.display = "none";
      document.getElementById("chatPanel").style.display = "flex";
    }

    // 注册用户
    async function register() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        setTip("用户名和密码不能为空", "error");
        return;
      }

      const res = await fetch(API_BASE + "/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: username,
          password: password
        })
      });

      const data = await res.json();

      if (res.ok) {
        setTip("注册成功，现在可以登录", "success");
      } else {
        setTip(data.detail || "注册失败", "error");
      }
    }

    // 登录用户
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!username || !password) {
        setTip("用户名和密码不能为空", "error");
        return;
      }

      const res = await fetch(API_BASE + "/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          username: username,
          password: password
        })
      });

      const data = await res.json();

      if (res.ok) {
        showChat(data.username);
      } else {
        setTip(data.detail || "登录失败", "error");
      }
    }

    // 把一条消息显示到页面上
    function addMessage(data) {
      const box = document.getElementById("messages");
      const div = document.createElement("div");

      if (data.type === "ack") {
        return;
      } else if (data.type === "system") {
        div.className = "message system";
        div.innerText = data.message;
      } else if (data.sender === currentUser) {
        div.className = "message me";

        const contentDiv = document.createElement("div");
        contentDiv.innerText = data.content;

        const timeDiv = document.createElement("div");
        timeDiv.className = "time";
        timeDiv.innerText = data.created_at || "";

        div.appendChild(contentDiv);
        div.appendChild(timeDiv);
      } else {
        div.className = "message other";

        const senderDiv = document.createElement("div");
        senderDiv.className = "sender";
        senderDiv.innerText = data.sender;

        const contentDiv = document.createElement("div");
        contentDiv.innerText = data.content;

        const timeDiv = document.createElement("div");
        timeDiv.className = "time";
        timeDiv.innerText = data.created_at || "";

        div.appendChild(senderDiv);
        div.appendChild(contentDiv);
        div.appendChild(timeDiv);
      }

      box.appendChild(div);
      box.scrollTop = box.scrollHeight;
    }

    // 年月日时间
    function formatDateTime(date) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();

      const hour = String(date.getHours()).padStart(2, "0");
      const minute = String(date.getMinutes()).padStart(2, "0");
      const second = String(date.getSeconds()).padStart(2, "0");

      return `${year}/${month}/${day} ${hour}:${minute}:${second}`;
    }

    // 清空消息
    function clearMessages() {
      document.getElementById("messages").innerHTML = "";
    }

    // 加载历史消息
    async function loadHistory(room) {
      const res = await fetch(API_BASE + "/history/" + encodeURIComponent(room));

      if (!res.ok) {
        addMessage({
          type: "system",
          message: "历史消息加载失败"
        });
        return;
      }

      const data = await res.json();

      if (data.messages.length === 0) {
        addMessage({
          type: "system",
          message: "暂无历史消息"
        });
        return;
      }

      data.messages.forEach(function (msg) {
        addMessage({
          type: "message",
          sender: msg.sender,
          content: msg.content,
          created_at: msg.created_at
        });
      });
    }

    // 清除当前房间历史消息
    async function clearHistory() {
      if (!currentRoom) {
        alert("请先进入房间");
        return;
      }

      const ok = confirm(`确定要清除 ${currentRoom} 的历史记录吗？`);

      if (!ok) {
        return;
      }

      const res = await fetch(
        API_BASE + "/history/" + encodeURIComponent(currentRoom),
        {
          method: "DELETE"
        }
      );

      const data = await res.json();

      if (res.ok) {
        clearMessages();

        addMessage({
          type: "system",
          message: `已清除 ${currentRoom} 的历史记录，共删除 ${data.deleted} 条`
        });
      } else {
        addMessage({
          type: "system",
          message: "清除历史记录失败"
        });
      }
    }

    // 退出登录
    function logout() {
      if (ws) {
        ignoreNextClose = true;
        ws.close();
        ws = null;
      }

      currentUser = "";
      currentRoom = "";

      clearMessages();

      document.getElementById("authPanel").style.display = "block";
      document.getElementById("chatPanel").style.display = "none";

      document.getElementById("currentUser").innerText = "-";
      document.getElementById("avatarText").innerText = "U";
      document.getElementById("password").value = "";

      setOnlineStatus("未登录", "");
      setRoomStatus("未进入房间");

      setTip("已退出登录，可以重新登录。");
    }

    // 连接后端 WebSocket 接口
    async function connect() {
      const room = document.getElementById("room").value.trim();

      if (!currentUser) {
        alert("请先登录");
        return;
      }

      if (!room) {
        alert("房间不能为空");
        return;
      }

      currentRoom = room;
      setOnlineStatus("连接中：" + currentUser, "warning");
      setRoomStatus("正在进入：" + room);

      if (ws) {
        ignoreNextClose = true;
        ws.close();
      }

      clearMessages();

      addMessage({
        type: "system",
        message: `正在进入房间 ${room}...`
      });

      await loadHistory(room);

      ws = new WebSocket(`${WS_BASE}/ws/${room}/${currentUser}`);

      // 连接成功时执行
      ws.onopen = function () {
        setOnlineStatus("在线：" + currentUser, "online");
        setRoomStatus("当前房间：" + room);

        addMessage({
          type: "system",
          message: `已进入房间 ${room}`
        });
      };

      // 服务端发消息给前端
      ws.onmessage = function (event) {
        const data = JSON.parse(event.data);
        addMessage(data);
      };

      ws.onclose = function () {
        if (ignoreNextClose) {
          ignoreNextClose = false;
          return;
        }

        setOnlineStatus("连接断开：" + currentUser, "warning");
        setRoomStatus("未连接房间");

        addMessage({
          type: "system",
          message: "连接已断开"
        });
      };
    }

    // 把输入框里的内容发给后端
    function sendMessage() {
      const input = document.getElementById("content");
      const content = input.value.trim();

      if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("请先进入房间，或等待连接成功");
        return;
      }

      if (!content) {
        return;
      }

      // 先在自己的页面显示自己发送的内容
      addMessage({
        type: "message",
        sender: currentUser,
        content: content,
        created_at: formatDateTime(new Date())
      });

      // 再发送给后端
      ws.send(JSON.stringify({
        content: content
      }));

      input.value = "";
    }

    // 回车发送消息
    document.getElementById("content").addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
