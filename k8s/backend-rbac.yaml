apiVersion: v1
kind: ServiceAccount
metadata:
  name: chat-backend-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: chat-backend-readonly
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: chat-backend-readonly-binding
  namespace: default
subjects:
  - kind: ServiceAccount
    name: chat-backend-sa
    namespace: default
roleRef:
  kind: Role
  name: chat-backend-readonly
  apiGroup: rbac.authorization.k8s.io
